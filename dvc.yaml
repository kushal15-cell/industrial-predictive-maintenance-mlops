stages:
  prepare_data:
    cmd: python -m src.create_dataset
    deps:
      - src/create_dataset.py
      - src/data/ingestion.py
      - src/data/validation.py
      - src/features/build_features.py
      - src/config.py
      - data/raw/CMAPSSData
    params:
      - data.raw_path
      - data.processed_path
      - features.rul_clip
    outs:
      - data/processed/train_fd001_processed.csv

  train_model:
    cmd: python -m src.models.train_model
    deps:
      - src/models/train_model.py
      - src/config.py
      - data/processed/train_fd001_processed.csv
    params:
      - data.processed_path
      - model.test_size
      - model.random_state
      - model.n_estimators
      - model.max_depth
      - features.rul_clip
      - mlflow.experiment_name
    outs:
      - models/random_forest_rul_model.pkl

  evaluate_model:
    cmd: python -m src.evaluation.evaluate_model
    deps:
      - src/evaluation/evaluate_model.py
      - src/config.py
      - data/processed/train_fd001_processed.csv
      - models/random_forest_rul_model.pkl
    params:
      - data.processed_path
      - model.test_size
      - model.random_state
    metrics:
      - reports/metrics.json:
          cache: false